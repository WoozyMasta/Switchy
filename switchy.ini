[Settings]
; Layout codes
; 00000409 = English (US)
; 00000419 = Russian
; 00000422 = Ukrainian
; 00000407 = German
; 0000040C = French
; Leave empty for auto-detection of system layouts.
Layout1=
Layout2=

; The Virtual Key Code for switching (Decimal).
; 20 = Caps Lock (Default)
; 19 = Pause/Break
; 45 = Insert
; 112 = F1
SwitchKey=20

; 1 = Ctrl + SwitchKey: convert selected text to the other layout and switch.
ConvertWithCtrl=1

; 1 = plain SwitchKey: synthetic copy; convert only if Unicode clipboard changes (real selection).
;     Always switches layout; Ctrl+SwitchKey with no selection also switches layout.
; Unicode clipboard backup/convert is capped (~1M chars) - if larger, only layout switches.
SmartCaps=0

; If normal layout activation fails: 0 = none, 1 = Alt+Shift, 2 = Ctrl+Shift, 3 = Win+Space
FallbackCycleHotkey=0

; Timeout (ms) for SendMessageTimeout layout-switch requests.
; Lower values reduce the first-letter lag on fast typing; higher values help slow or heavy apps.
; Default: 80. Range: 10-2000.
SwitchTimeoutMs=80

; Suppress layout switch for fullscreen / borderless foreground windows (games).
; Bit flags: 0 = off, 1 = fullscreen (default), 2 = borderless (no title bar), 3 = both.
FullScreenExcludeSwitch=1

; Same flags for text conversion (Ctrl+SwitchKey / SmartCaps).
FullScreenExcludeConvert=1

[ExcludeSwitch]
; Suppress layout switch for specific executables. Value controls scope:
;   empty or 1 = only when this app's window is active (default)
;   0           = whenever this process is running anywhere (global mode)
; game.exe=
; game.exe=1
; game.exe=0

[ExcludeConvert]
; Same syntax as ExcludeSwitch (suppresses text conversion).
; SomeApp.exe=
; SomeApp.exe=0
