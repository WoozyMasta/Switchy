name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "[0-9]+.[0-9]+.[0-9]+"
  pull_request:

jobs:
  ci:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-clang-tools-extra
            make

      - name: Check formatting
        shell: msys2 {0}
        run: make fmt-check

      - name: Run lint
        shell: msys2 {0}
        run: make lint

      - name: Run tests
        shell: msys2 {0}
        run: make test
